settings:
  # TextDisplay lines are real entities. Lower values feel tighter.
  line-height: 0.38
  update-interval-ticks: 20
  view-range: 64.0
  shadowed: false
  see-through: false
  default-background: false
  background-argb: 0
  line-width: 220
  billboard: CENTER
  alignment: CENTER
  brightness:
    block: 15
    sky: 15

web:
  # Enable the browser-based editor. Disabled by default.
  enabled: false
  # Bind address. Use 127.0.0.1 to keep it loopback-only.
  bind: 127.0.0.1
  # Port the editor listens on.
  port: 8765
  # Auth token. Leave empty to auto-generate one on first start and write it back here.
  token: ""

examples:
  animation-syntax: "<gold>Frame 1||<yellow>Frame 2||<white>Frame 3"
  placeholders: "{online}, {max_players}, {world}, {x}, {y}, {z}, {time}, {date}, {tps}"
  web-editor: "Run /holo pin in-game to generate a coordinate code, then paste it into the web editor."
